<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnippetCraft - Aesthetic Post Creator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- html-to-image library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon"><i data-lucide="type"></i></div>
                    <h1>SnippetCraft</h1>
                </div>
                <p>Create aesthetic visuals for social media.</p>
            </header>

            <div class="sidebar-content">
                <!-- Content Input -->
                <section class="control-group">
                    <label class="label"><i data-lucide="settings-2"></i> Content</label>
                    <textarea id="textInput" placeholder="Paste your code or quote...">// Your beautiful code or quote here

const greet = () => {
  console.log("Hello World!");
};</textarea>
                </section>

                <!-- Backgrounds -->
                <section class="control-group">
                    <label class="label"><i data-lucide="palette"></i> Background</label>
                    <div class="bg-grid" id="bgGrid">
                        <!-- Background buttons will be injected here -->
                    </div>
                </section>

                <!-- Style Controls -->
                <section class="control-group">
                    <label class="label">Font Family</label>
                    <div class="toggle-group" id="fontToggle">
                        <button class="toggle-btn active" data-font="mono">Mono</button>
                        <button class="toggle-btn" data-font="sans">Sans</button>
                        <button class="toggle-btn" data-font="serif">Serif</button>
                    </div>
                </section>

                <section class="control-group">
                    <div class="label-row">
                        <label class="label">Padding</label>
                        <span class="value-display" id="paddingVal">48px</span>
                    </div>
                    <input type="range" id="paddingInput" min="16" max="128" value="48">
                </section>

                <section class="control-group">
                    <div class="label-row">
                        <label class="label">Border Radius</label>
                        <span class="value-display" id="radiusVal">16px</span>
                    </div>
                    <input type="range" id="radiusInput" min="0" max="48" value="16">
                </section>

                <section class="control-group">
                    <label class="label"><i data-lucide="layout"></i> Aspect Ratio</label>
                    <div class="grid-4" id="ratioToggle">
                        <button class="toggle-btn active" data-ratio="auto">AUTO</button>
                        <button class="toggle-btn" data-ratio="1:1">1:1</button>
                        <button class="toggle-btn" data-ratio="4:5">4:5</button>
                        <button class="toggle-btn" data-ratio="16:9">16:9</button>
                    </div>
                </section>
            </div>

            <footer class="sidebar-footer">
                <button id="exportBtn" class="primary-btn">
                    <i data-lucide="download"></i> Export Image
                </button>
                <div class="footer-row">
                    <button id="copyImageBtn" class="secondary-btn">
                        <i data-lucide="share-2"></i> Copy Image
                    </button>
                    <button id="copyTextBtn" class="secondary-btn">
                        <i data-lucide="copy"></i> Copy Text
                    </button>
                </div>
            </footer>
        </aside>

        <!-- Preview Area -->
        <main class="preview-area">
            <div class="atmosphere">
                <div class="blob blob-1"></div>
                <div class="blob blob-2"></div>
            </div>

            <div class="preview-container">
                <div id="captureArea" class="capture-area bg-sunset">
                    <div id="snippetCard" class="snippet-card">
                        <div class="window-controls">
                            <div class="dot red"></div>
                            <div class="dot amber"></div>
                            <div class="dot green"></div>
                        </div>
                        <pre id="snippetText" class="font-mono">// Your beautiful code or quote here
